<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChoriLight - Chorizos Artesanales</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#111;min-height:100vh}
a{color:inherit;text-decoration:none}
.navbar{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:14px 5%;z-index:50}
.navbar h1{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:#b33124}
.cart-btn{position:relative;background:#111;color:#fff;border:none;border-radius:99px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.cart-count{position:absolute;top:-6px;right:-6px;background:#b33124;color:#fff;font-size:11px;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:700}
.wrap{max-width:1100px;margin:0 auto;padding:0 5% 4rem}
.banner-carousel{position:relative;margin-top:1.5rem;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,#1a1a1a,#3a1410);min-height:220px;display:flex;align-items:center}
.banner-slide{display:none;padding:2.5rem 2rem;color:#fff;text-align:center;width:100%}
.banner-slide.active{display:block}
.banner-slide h2{font-size:clamp(22px,4vw,34px);font-weight:700;letter-spacing:-0.5px;margin-bottom:8px}
.banner-slide p{font-size:15px;color:#e0c9c2}
.banner-dots{display:flex;gap:6px;justify-content:center;margin-top:1rem}
.banner-dot{width:7px;height:7px;border-radius:50%;background:#ddd;border:none;cursor:pointer}
.banner-dot.active{background:#111}
.section-title{font-size:13px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin:2rem 0 1rem}
.cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.cat-chip{flex-shrink:0;font-size:13px;padding:8px 16px;border-radius:99px;border:1px solid #e0e0e0;background:none;cursor:pointer;color:#666}
.cat-chip.active{background:#111;color:#fff;border-color:#111}
.product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:1rem}
.product-card{border:1px solid #eee;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;background:#fff}
.product-img{height:120px;border-radius:10px;background:#fdeee9;display:flex;align-items:center;justify-content:center;font-size:48px}
.product-cat{font-size:11px;color:#b33124;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.product-name{font-size:15px;font-weight:600}
.product-stars{font-size:13px;color:#e0a800}
.product-reviews{font-size:11px;color:#999;margin-left:4px}
.product-price{font-size:17px;font-weight:700;margin-top:2px}
.product-stock{font-size:11px;color:#a32d2d;font-weight:600}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.qty-val{font-size:14px;font-weight:600;min-width:18px;text-align:center}
.add-btn{margin-top:8px;padding:10px;font-size:14px;font-weight:600;background:#111;color:#fff;border:none;border-radius:10px;cursor:pointer}
.add-btn:disabled{background:#ddd;color:#999;cursor:not-allowed}
.footer{text-align:center;padding:2rem 0;color:#aaa;font-size:12px}
.footer a{color:#bbb;text-decoration:underline}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:100}
.overlay.show{display:block}
.cart-drawer{position:fixed;top:0;right:-380px;width:360px;max-width:90vw;height:100%;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:101;transition:right .25s ease;display:flex;flex-direction:column}
.cart-drawer.show{right:0}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid #eee}
.cart-head h3{font-size:17px;font-weight:700}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#888}
.cart-items{flex:1;overflow-y:auto;padding:14px 18px}
.cart-item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f3f3f3}
.cart-item-name{font-size:13px;font-weight:600}
.cart-item-meta{font-size:12px;color:#888}
.cart-item-remove{font-size:12px;color:#a32d2d;background:none;border:none;cursor:pointer}
.cart-foot{padding:14px 18px;border-top:1px solid #eee;display:flex;flex-direction:column;gap:10px}
.cart-foot input,.cart-foot select{font-size:13px;padding:10px 12px;border:1px solid #ddd;border-radius:8px}
.cart-subtotal{display:flex;justify-content:space-between;font-size:15px;font-weight:700}
.checkout-btn{padding:12px;font-size:14px;font-weight:700;background:#b33124;color:#fff;border:none;border-radius:10px;cursor:pointer}
.empty-cart{text-align:center;color:#bbb;font-size:13px;padding:2rem 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;display:none;z-index:999}
</style>
</head>
<body>
<div class="navbar">
  <h1>🌭 ChoriLight</h1>
  <button class="cart-btn" onclick="openCart()">🛒 Carrito<span class="cart-count" id="cart-count">0</span></button>
</div>

<div class="wrap">
  <div class="banner-carousel" id="banner-carousel"></div>

  <div class="section-title">Categorías</div>
  <div class="cat-row" id="cat-row"></div>

  <div class="section-title">Productos</div>
  <div class="product-grid" id="product-grid"></div>

  <div class="footer">© ChoriLight · Chorizos artesanales hechos con amor · <a href="/admin">Admin</a></div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head"><h3>Tu carrito</h3><button class="close-btn" onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <input id="ck-nombre" placeholder="Nombre*"/>
    <input id="ck-telefono" placeholder="Teléfono"/>
    <input id="ck-direccion" placeholder="Dirección de entrega"/>
    <select id="ck-pago"></select>
    <div class="cart-subtotal"><span>Total</span><span id="cart-total">$0</span></div>
    <button class="checkout-btn" onclick="checkout()">Confirmar pedido</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/data.js"></script>
<script>
let currentCategory='Todos',bannerIdx=0,bannerTimer=null;

function init(){renderBanners();renderCategories();renderProducts();renderPaymentOptions();updateCartCount();}

/* ---------- Banner carousel ---------- */
function renderBanners(){const banners=getBanners().filter(b=>b.activo);const el=document.getElementById('banner-carousel');if(!banners.length){el.innerHTML='<div class="banner-slide active"><h2>Chorizos artesanales</h2><p>Directo a tu parrilla</p></div>';return;}el.innerHTML=banners.map((b,i)=>`<div class="banner-slide${i===0?' active':''}"><h2>${esc(b.titulo)}</h2><p>${esc(b.subtitulo||'')}</p></div>`).join('')+`<div class="banner-dots">${banners.map((b,i)=>`<button class="banner-dot${i===0?' active':''}" onclick="goToBanner(${i})"></button>`).join('')}</div>`;bannerIdx=0;if(bannerTimer)clearInterval(bannerTimer);if(banners.length>1)bannerTimer=setInterval(()=>goToBanner((bannerIdx+1)%banners.length),5000);}
function goToBanner(i){const slides=document.querySelectorAll('.banner-slide'),dots=document.querySelectorAll('.banner-dot');slides.forEach(s=>s.classList.remove('active'));dots.forEach(d=>d.classList.remove('active'));if(slides[i])slides[i].classList.add('active');if(dots[i])dots[i].classList.add('active');bannerIdx=i;}

/* ---------- Categorías ---------- */
function renderCategories(){const cats=['Todos',...new Set(getProducts().map(p=>p.categoria))];document.getElementById('cat-row').innerHTML=cats.map(c=>`<button class="cat-chip${c===currentCategory?' active':''}" onclick="setCategory('${esc(c)}',this)">${esc(c)}</button>`).join('');}
function setCategory(c,btn){currentCategory=c;document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProducts();}

/* ---------- Productos ---------- */
const qtyState={};
function renderProducts(){const all=getProducts();const list=currentCategory==='Todos'?all:all.filter(p=>p.categoria===currentCategory);const el=document.getElementById('product-grid');if(!list.length){el.innerHTML='<div class="empty-cart">No hay productos en esta categoría</div>';return;}el.innerHTML=list.map(p=>{if(qtyState[p.id]===undefined)qtyState[p.id]=1;const agotado=Number(p.stock)<=0;return`<div class="product-card"><div class="product-img">${p.img?`<img src="${esc(p.img)}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`:'🌭'}</div><div class="product-cat">${esc(p.categoria)}</div><div class="product-name">${esc(p.nombre)}</div><div><span class="product-stars">${starsHtml(p.rating)}</span><span class="product-reviews">(${p.resenas||0} reseñas)</span></div><div class="product-price">${money(p.precio)}</div>${agotado?'<div class="product-stock">Agotado</div>':''}<div class="qty-row"><button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button><span class="qty-val" id="qty-${p.id}">${qtyState[p.id]}</span><button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button></div><button class="add-btn" ${agotado?'disabled':''} onclick="addToCart('${p.id}')">${agotado?'Agotado':'Agregar al carrito'}</button></div>`;}).join('');}
function changeQty(id,delta){const next=Math.max(1,(qtyState[id]||1)+delta);qtyState[id]=next;const elQty=document.getElementById('qty-'+id);if(elQty)elQty.textContent=next;}

/* ---------- Carrito ---------- */
function openCart(){renderCart();document.getElementById('cart-drawer').classList.add('show');document.getElementById('overlay').classList.add('show');}
function closeCart(){document.getElementById('cart-drawer').classList.remove('show');document.getElementById('overlay').classList.remove('show');}
function addToCart(id){const product=getProducts().find(p=>p.id===id);if(!product||Number(product.stock)<=0)return;const qty=qtyState[id]||1;const cart=getCart();const existing=cart.find(i=>i.id===id);if(existing)existing.cantidad+=qty;else cart.push({id,nombre:product.nombre,precio:product.precio,cantidad:qty});saveCart(cart);updateCartCount();showToast('Agregado al carrito ✓');qtyState[id]=1;const elQty=document.getElementById('qty-'+id);if(elQty)elQty.textContent=1;}
function updateCartCount(){const count=getCart().reduce((s,i)=>s+i.cantidad,0);document.getElementById('cart-count').textContent=count;}
function renderCart(){const cart=getCart();const el=document.getElementById('cart-items');if(!cart.length){el.innerHTML='<div class="empty-cart">Tu carrito está vacío</div>';}else{el.innerHTML=cart.map(i=>`<div class="cart-item"><div><div class="cart-item-name">${esc(i.nombre)}</div><div class="cart-item-meta">${i.cantidad} x ${money(i.precio)}</div></div><div style="text-align:right"><div class="cart-item-meta">${money(i.precio*i.cantidad)}</div><button class="cart-item-remove" onclick="removeFromCart('${i.id}')">Quitar</button></div></div>`).join('');}document.getElementById('cart-total').textContent=money(cart.reduce((s,i)=>s+i.precio*i.cantidad,0));}
function removeFromCart(id){const cart=getCart().filter(i=>i.id!==id);saveCart(cart);renderCart();updateCartCount();}
function renderPaymentOptions(){const sel=document.getElementById('ck-pago');const payments=getPayments().filter(p=>p.activo);sel.innerHTML=payments.map(p=>`<option value="${esc(p.id)}">${esc(p.nombre)}</option>`).join('')||'<option value="">Sin métodos de pago configurados</option>';}
function checkout(){const cart=getCart();if(!cart.length){showToast('Tu carrito está vacío');return;}const nombre=document.getElementById('ck-nombre').value.trim();if(!nombre){showToast('Escribe tu nombre para continuar');return;}const telefono=document.getElementById('ck-telefono').value.trim();const direccion=document.getElementById('ck-direccion').value.trim();const metodoPago=document.getElementById('ck-pago').value;const total=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);const order={id:uid('ord'),fecha:new Date().toLocaleString('es-CO'),nombre,telefono,direccion,metodoPago,items:cart,total,estado:'Pendiente'};addOnlineOrder(order);clearCart();updateCartCount();renderCart();closeCart();showToast('¡Pedido recibido! Te contactaremos para coordinar la entrega.');document.getElementById('ck-nombre').value='';document.getElementById('ck-telefono').value='';document.getElementById('ck-direccion').value='';}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}

init();
</script>
</body>
</html>
